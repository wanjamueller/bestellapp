<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="shortcut icon" href="./assets/icons/burger.png" type="image/x-icon" />
        <title>BurgerHouse</title>

        <link rel="stylesheet" href="style.css" />
        <link rel="stylesheet" href="./styles/standard.css" />
        <link rel="stylesheet" href="./styles/fonts.css" />
        <link rel="stylesheet" href="./styles/variables.css" />
        <link rel="stylesheet" href="./styles/header.css" />
        <link rel="stylesheet" href="./styles/footer.css" />
        <link rel="stylesheet" href="./styles/dishes.css" />
        <link rel="stylesheet" href="./styles/basket.css" />

        <script defer src="script.js"></script>
        <script defer src="./scripts/db.js"></script>
        <script defer src="./scripts/templates.js"></script>
    </head>
    <body onload="init()">
        <header class="main-header">
            <img class="logo" src="./assets/img/Logo.svg" alt="BurgerHome-logo" />
            <nav>
                <img src="./assets/img/nav.svg" alt="Burger-Nav-Icon" />
            </nav>
        </header>

        <main class="main-content">
            <!-- #region hero section -->
            <section class="hero-section">
                <div class="hero-img-div">
                    <img class="hero" src="./assets/img/hero.jpg" alt="" />
                </div>
                <div class="overlay">
                    <img src="./assets/icons/overlay.png" alt="" />
                </div>
                <div class="hero-txt-div">
                    <div class="hero-txt">
                        <h1><span class="text-orange">Burger</span><span class="text-dark">House</span></h1>
                        <div class="rating">
                            <img src="./assets/icons/star.svg" alt="rating-star" />
                            <p id="rating">4,1</p>
                            <p>(317)</p>
                        </div>
                    </div>
                    <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
                </div>
            </section>
            <!-- #endregion hero section  -->
            <section class="category burger-section">
                <img src="./assets/icons/burger.png" alt="" />
                <h2>Burger & Sandwiches</h2>
                <div class="orange-bar"></div>
            </section>
            <section class="dishes" id="burger-container"></section>
            <section class="category pizza-section">
                <img src="./assets/icons/pizza.png" alt="" />
                <h2>Pizza</h2>
                <div class="orange-bar"></div>
            </section>
            <section class="dishes" id="pizza-container"></section>
            <section class="category salad-section">
                <img src="./assets/icons/salad.png" alt="" />
                <h2>Salad</h2>
                <div class="orange-bar"></div>
            </section>
            <section class="dishes" id="salad-container"></section>
        </main>
        <footer class="main-footer">
            <p><strong>©</strong> 2026 BurgerHouse</p>
            <a href="./pages/imprint.html">Imprint</a>
            <p>Cookie Preferences</p>
        </footer>
        <dialog class="cart"></dialog>
        <dialog class="order-confirmed"></dialog>
    </body>
</html>
