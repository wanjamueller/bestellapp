<svg xmlns="http://www.w3.org/2000/svg" width="91" height="91" viewBox="0 0 91 91" fill="none">
  <title>Desserts</title>
  <defs>
    <linearGradient id="cake" x1="18" y1="38" x2="73" y2="78" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF8A0B"/>
      <stop offset="1" stop-color="#D94B03"/>
    </linearGradient>
    <linearGradient id="frosting" x1="18" y1="26" x2="72" y2="45" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFF1C8"/>
      <stop offset="1" stop-color="#F7C873"/>
    </linearGradient>
    <linearGradient id="plate" x1="9" y1="77" x2="82" y2="86" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFE4AF"/>
      <stop offset="1" stop-color="#F4B55B"/>
    </linearGradient>
  </defs>

  <!-- cherry and stem -->
  <path d="M49.5 23.2c.4-5.7 4.1-10 9.3-11.8" stroke="#3B1B0B" stroke-width="3" stroke-linecap="round"/>
  <path d="M58.2 10.9c3.8-1.3 7.1-.2 8.5 2.9-4.1 1.5-7.3.3-8.5-2.9Z" fill="#D9A70F" stroke="#3B1B0B" stroke-width="2.5" stroke-linejoin="round"/>
  <circle cx="47.2" cy="24.8" r="8.2" fill="#EF6106" stroke="#3B1B0B" stroke-width="3.2"/>
  <path d="M42.8 21.4c1.6-2.3 4.4-3.1 6.7-2" stroke="#FFAE23" stroke-width="2.3" stroke-linecap="round"/>

  <!-- cake body -->
  <path d="M16.2 39.4h58.6l3.7 35.3c.5 5.1-3.2 8.8-8.4 8.8H20.9c-5.2 0-8.9-3.7-8.4-8.8Z" fill="url(#cake)" stroke="#3B1B0B" stroke-width="3.2" stroke-linejoin="round"/>

  <!-- filling layers -->
  <path d="M15 54.1h61.8l1.1 10H13.9Z" fill="#FFD996" stroke="#3B1B0B" stroke-width="2.7" stroke-linejoin="round"/>
  <path d="M16.4 68.4h61.2l.7 6.9H13.1l.7-6.9Z" fill="#F5A116" stroke="#3B1B0B" stroke-width="2.4" stroke-linejoin="round"/>
  <path d="M22.7 45.6c2.6 2.1 5.4 2.1 8 0 2.6-2.1 5.4-2.1 8 0 2.6 2.1 5.4 2.1 8 0 2.6-2.1 5.4-2.1 8 0 2.6 2.1 5.4 2.1 8 0" stroke="#B83D02" stroke-width="2.3" stroke-linecap="round"/>

  <!-- frosting cap with rounded drips -->
  <path d="M16 40.6c-1.9 0-3.4-1.5-3.4-3.4 0-5.9 4.5-10.4 10.4-10.4h45c5.9 0 10.4 4.5 10.4 10.4 0 1.9-1.5 3.4-3.4 3.4H64.4v5.1c0 3.1-2.2 5.4-5.2 5.4-2.9 0-5.1-2.3-5.1-5.4v-5.1H43.8v2.5c0 3.1-2.2 5.4-5.1 5.4-3 0-5.2-2.3-5.2-5.4v-2.5Z" fill="url(#frosting)" stroke="#3B1B0B" stroke-width="3.2" stroke-linejoin="round"/>
  <path d="M20.2 33.2h48.9" stroke="#FFF7DC" stroke-width="2.2" stroke-linecap="round" opacity=".9"/>

  <!-- cake crumb details -->
  <path d="M23.8 76.6h5.1M62.2 77h4.5M43.2 72.6h4.7" stroke="#8F2D02" stroke-width="2.4" stroke-linecap="round"/>

  <!-- plate -->
  <path d="M8.4 81.4c8.5 4.6 65.7 4.6 74.2 0-1.5 5.1-8.8 7.1-37.1 7.1S9.9 86.5 8.4 81.4Z" fill="url(#plate)" stroke="#3B1B0B" stroke-width="3" stroke-linejoin="round"/>
</svg>
